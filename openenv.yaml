spec_version: 1
name: claude_code_for_health
type: space
runtime: fastapi
app: server.app:app
port: 8000

description: >
  Clinical terminal environment where an AI agent works through medical tasks
  by typing CLI commands. Three task types: diagnostic workup, medical
  calculations, and clinical note review. All programmatically graded.

tasks:
  - name: easy
    description: "Simple clinical tasks — straightforward note reviews, basic calculations, or clear-cut diagnoses"
    difficulty: easy

  - name: medium
    description: "Moderate clinical tasks — multi-step calculations, non-obvious note errors, or differential-heavy diagnoses"
    difficulty: medium

  - name: hard
    description: "Complex clinical tasks — scoring systems (APACHE, Wells), subtle pharmacotherapy errors, or rare diagnoses"
    difficulty: hard
